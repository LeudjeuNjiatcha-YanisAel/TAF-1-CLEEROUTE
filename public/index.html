<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Machine Blog</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; font-family:'Outfit',sans-serif;}

    :root {
      --bg: #15151a;
      --surface: #141416;
      --surface2: #1c1c20;
      --border: #2a2a30;
      --accent: #3f97d2;
      --accent2: #3670eb;
      --text: #f0ede6;
      --muted: #888890;
      --danger: #e06060;
      --success: #60c090;
      --radius: 4px;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* HEADER */
    header {
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      position: sticky;
      top: 0;
      background: rgba(12,12,14,0.92);
      backdrop-filter: blur(12px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .logo span { font-style: italic; font-weight: 400; color: var(--text); }

    nav { display: flex; gap: 8px; align-items: center; }

    nav button {
      background: none;
      border: 1px solid transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: all 0.2s;
    }

    nav button:hover { color: var(--text); border-color: var(--border); }
    nav button.active { color: var(--accent); border-color: var(--accent); }

    .btn-new {
      background: var(--accent) !important;
      color: var(--bg) !important;
      border-color: var(--accent) !important;
      font-weight: 600 !important;
    }
    .btn-new:hover { background: var(--accent2) !important; }

    /* HERO */
    .hero {
      padding: 80px 40px 60px;
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: end;
      border-bottom: 1px solid var(--border);
    }

    .hero-label {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -1px;
    }

    .hero h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .hero-sub {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.7;
      margin-top: 20px;
    }

    .hero-stats {
      display: flex;
      gap: 32px;
      padding-top: 32px;
    }

    .stat { display: flex; flex-direction: column; gap: 4px; }

    .stat-num {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }

    /* SEARCH BAR */
    .search-wrap {
      position: relative;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      padding: 16px 20px 16px 50px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--muted); }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    .filter-row input, .filter-row select {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }

    .filter-row input:focus, .filter-row select:focus { border-color: var(--accent); }
    .filter-row input::placeholder { color: var(--muted); }
    .filter-row select option { background: var(--surface2); }

    .btn-filter {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 18px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-filter:hover { border-color: var(--accent); color: var(--accent); }

    /* MAIN LAYOUT */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 40px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
    }

    .section-count {
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* ARTICLES GRID */
    .articles-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
    }

    .article-card {
      background: var(--surface);
      padding: 28px;
      cursor: pointer;
      transition: background 0.2s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .article-card:hover { background: var(--surface2); }

    .card-cat {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
    }

    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      line-height: 1.3;
      color: var(--text);
    }

    .card-excerpt {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-author {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .card-author strong { color: var(--text); }

    .card-actions { display: flex; gap: 6px; }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      width: 30px;
      height: 30px;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: all 0.2s;
    }

    .btn-icon:hover { color: var(--text); border-color: var(--muted); }
    .btn-icon.del:hover { color: var(--danger); border-color: var(--danger); }
    .btn-icon.edit:hover { color: var(--accent); border-color: var(--accent); }

    /* EMPTY STATE */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      background: var(--surface);
    }

    .empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.4; }
    .empty h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 0.9rem; }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* MODAL */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 100%;
      max-width: 560px;
      border-radius: 2px;
      transform: translateY(20px);
      transition: transform 0.25s;
    }

    .overlay.open .modal { transform: translateY(0); }

    .modal-header {
      padding: 24px 28px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 700;
    }

    .btn-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px;
      transition: color 0.2s;
    }

    .btn-close:hover { color: var(--text); }

    .modal-body { padding: 28px; display: flex; flex-direction: column; gap: 16px; }

    .field { display: flex; flex-direction: column; gap: 6px; }

    .field label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
    }

    .field input, .field textarea, .field select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 12px 14px;
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .field input:focus, .field textarea:focus, .field select:focus { border-color: var(--accent); }
    .field input::placeholder, .field textarea::placeholder { color: var(--muted); }
    .field select option { background: var(--surface2); }

    .modal-footer {
      padding: 20px 28px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 10px 20px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-cancel:hover { border-color: var(--muted); color: var(--text); }

    .btn-submit {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: var(--bg);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-submit:hover { background: var(--accent2); }

    /* TOAST */
    .toast-wrap {
      position: fixed;
      bottom: 32px;
      right: 32px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 300;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      color: var(--text);
      font-size: 0.875rem;
      padding: 14px 20px;
      border-radius: var(--radius);
      min-width: 260px;
      animation: slideIn 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .toast.error { border-left-color: var(--danger); }
    .toast.success { border-left-color: var(--success); }

    @keyframes slideIn {
      from { transform: translateX(40px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* VIEW MODAL */
    .view-meta {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .view-badge {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
    }

    .view-badge.cat { border-color: var(--accent); color: var(--accent); }

    .view-content {
      font-size: 0.95rem;
      line-height: 1.8;
      color: var(--muted);
      white-space: pre-wrap;
      max-height: 300px;
      overflow-y: auto;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      header { padding: 0 20px; }
      .hero { grid-template-columns: 1fr; padding: 40px 20px; gap: 32px; }
      main { padding: 32px 20px; }
      .articles-grid { grid-template-columns: 1fr; }
      .hero-stats { gap: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Machine<span> Blog</span></div>
  <nav>
    <button class="active" onclick="showAll()">Tous les articles</button>
    <button class="btn-new" onclick="openCreate()">+ Nouvel article</button>
  </nav>
</header>


<section class="hero">
  <div>
    <div class="hero-label">Bienvenue sur la plateforme</div>
    <h1>Vos articles,<br/><em>bien gérés.</em></h1>
    <p class="hero-sub">Créez, modifiez et organisez vos articles de blog en toute simplicité.</p>
    <div class="hero-stats">
      <div class="stat">
        <span class="stat-num" id="stat-total">—</span>
        <span class="stat-label">Articles</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-cats">—</span>
        <span class="stat-label">Catégories</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="stat-authors">—</span>
        <span class="stat-label">Auteurs</span>
      </div>
    </div>
  </div>
  <div>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="Rechercher un article..." oninput="handleSearch(this.value)" />
    </div>
    <div class="filter-row">
      <input type="text" id="filter-cat" placeholder="Catégorie..." />
      <input type="date" id="filter-date" />
      <button class="btn-filter" onclick="handleFilter()">Filtrer</button>
      <button class="btn-filter" onclick="showAll()">Reset</button>
    </div>
  </div>
</section>

<main>
  <div class="section-header">
    <span class="section-title" id="section-title">Tous les articles</span>
    <span class="section-count" id="section-count"></span>
  </div>
  <div id="articles-container">
    <div class="loading"><div class="spinner"></div>Chargement...</div>
  </div>
</main>

<div class="overlay" id="form-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="form-title">Nouvel article</span>
      <button class="btn-close" onclick="closeForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Titre *</label>
        <input type="text" id="f-titre" placeholder="Titre de l'article" />
      </div>
      <div class="field">
        <label>Auteur *</label>
        <input type="text" id="f-auteur" placeholder="Nom de l'auteur" />
      </div>
      <div class="field">
        <label>Catégorie</label>
        <input type="text" id="f-categorie" placeholder="Ex : Tech, Culture, Sport..." />
      </div>
      <div class="field">
        <label>Contenu</label>
        <textarea id="f-contenu" rows="5" placeholder="Contenu de l'article..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeForm()">Annuler</button>
      <button class="btn-submit" onclick="submitForm()">Publier</button>
    </div>
  </div>
</div>

<!-- MODAL VOIR -->
<div class="overlay" id="view-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="view-title">Article</span>
      <button class="btn-close" onclick="closeView()">✕</button>
    </div>
    <div class="modal-body">
      <div class="view-meta" id="view-meta"></div>
      <div class="view-content" id="view-content"></div>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toasts"></div>

<script>
  const API = 'http://localhost:3000/api/articles';
  let editingId = null;
  let searchTimer = null;

  // ─── FETCH ───────────────────────────────────────────────
  async function api(path = '', opts = {}) {
    const res = await fetch(API + path, {
      headers: { 'Content-Type': 'application/json' },
      ...opts
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.message || 'Erreur serveur');
    }
    return res.json();
  }

  // ─── LOAD ALL ─────────────────────────────────────────────
  async function loadArticles() {
    try {
      const data = await api();
      renderArticles(data);
      updateStats(data);
    } catch (e) {
      showContainer(`<div class="empty"><div class="empty-icon">⚠️</div><h3>Impossible de charger</h3><p>Vérifiez que le serveur est lancé sur localhost:3000</p></div>`);
    }
  }

  function showAll() {
    document.getElementById('search-input').value = '';
    document.getElementById('filter-cat').value = '';
    document.getElementById('filter-date').value = '';
    document.getElementById('section-title').textContent = 'Tous les articles';
    loadArticles();
  }

  // ─── SEARCH ──────────────────────────────────────────────
  function handleSearch(val) {
    clearTimeout(searchTimer);
    if (!val.trim()) { loadArticles(); return; }
    searchTimer = setTimeout(async () => {
      try {
        const data = await api('/search?query=' + encodeURIComponent(val));
        document.getElementById('section-title').textContent = `Résultats pour "${val}"`;
        renderArticles(data);
      } catch (e) { toast(e.message, 'error'); }
    }, 350);
  }

  // ─── FILTER ──────────────────────────────────────────────
  async function handleFilter() {
    const cat = document.getElementById('filter-cat').value;
    const date = document.getElementById('filter-date').value;
    const params = new URLSearchParams();
    if (cat) params.append('categorie', cat);
    if (date) params.append('date', date);
    try {
      const data = await api('/filter?' + params.toString());
      document.getElementById('section-title').textContent = 'Articles filtrés';
      renderArticles(data);
    } catch (e) { toast(e.message, 'error'); }
  }

  // ─── RENDER ──────────────────────────────────────────────
  function renderArticles(articles) {
    document.getElementById('section-count').textContent = `${articles.length} article${articles.length !== 1 ? 's' : ''}`;
    if (!articles.length) {
      showContainer(`<div class="empty"><div class="empty-icon">📭</div><h3>Aucun article</h3><p>Créez votre premier article avec le bouton ci-dessus.</p></div>`);
      return;
    }
    const html = `<div class="articles-grid">${articles.map(a => cardHTML(a)).join('')}</div>`;
    showContainer(html);
  }

  function cardHTML(a) {
    const excerpt = a.contenu ? a.contenu.substring(0, 140) + (a.contenu.length > 140 ? '…' : '') : 'Aucun contenu.';
    return `
      <div class="article-card" onclick="viewArticle(${a.id})">
        ${a.categorie ? `<div class="card-cat">${a.categorie}</div>` : ''}
        <div class="card-title">${a.titre}</div>
        <div class="card-excerpt">${excerpt}</div>
        <div class="card-footer">
          <div class="card-author">Par <strong>${a.auteur}</strong></div>
          <div class="card-actions" onclick="event.stopPropagation()">
            <button class="btn-icon edit" onclick="openEdit(${a.id})" title="Modifier">✏️</button>
            <button class="btn-icon del" onclick="deleteArticle(${a.id})" title="Supprimer">🗑</button>
          </div>
        </div>
      </div>`;
  }

  function showContainer(html) {
    document.getElementById('articles-container').innerHTML = html;
  }

  function updateStats(articles) {
    document.getElementById('stat-total').textContent = articles.length;
    const cats = new Set(articles.map(a => a.categorie).filter(Boolean));
    document.getElementById('stat-cats').textContent = cats.size || 0;
    const authors = new Set(articles.map(a => a.auteur).filter(Boolean));
    document.getElementById('stat-authors').textContent = authors.size || 0;
  }

  // ─── VIEW ─────────────────────────────────────────────────
  async function viewArticle(id) {
    try {
      const a = await api('/' + id);
      document.getElementById('view-title').textContent = a.titre;
      document.getElementById('view-meta').innerHTML = `
        <span class="view-badge">Par ${a.auteur}</span>
        ${a.categorie ? `<span class="view-badge cat">${a.categorie}</span>` : ''}
        ${a.created_at ? `<span class="view-badge">${new Date(a.created_at).toLocaleDateString('fr-FR')}</span>` : ''}
      `;
      document.getElementById('view-content').textContent = a.contenu || 'Aucun contenu.';
      document.getElementById('view-overlay').classList.add('open');
    } catch (e) { toast(e.message, 'error'); }
  }

  function closeView() { document.getElementById('view-overlay').classList.remove('open'); }

  // ─── CREATE / EDIT FORM ───────────────────────────────────
  function openCreate() {
    editingId = null;
    document.getElementById('form-title').textContent = 'Nouvel article';
    document.getElementById('f-titre').value = '';
    document.getElementById('f-auteur').value = '';
    document.getElementById('f-categorie').value = '';
    document.getElementById('f-contenu').value = '';
    document.querySelector('.btn-submit').textContent = 'Publier';
    document.getElementById('form-overlay').classList.add('open');
  }

  async function openEdit(id) {
    try {
      const a = await api('/' + id);
      editingId = id;
      document.getElementById('form-title').textContent = 'Modifier l\'article';
      document.getElementById('f-titre').value = a.titre || '';
      document.getElementById('f-auteur').value = a.auteur || '';
      document.getElementById('f-categorie').value = a.categorie || '';
      document.getElementById('f-contenu').value = a.contenu || '';
      document.querySelector('.btn-submit').textContent = 'Enregistrer';
      document.getElementById('form-overlay').classList.add('open');
    } catch (e) { toast(e.message, 'error'); }
  }

  function closeForm() { document.getElementById('form-overlay').classList.remove('open'); }

  async function submitForm() {
    const body = {
      titre: document.getElementById('f-titre').value.trim(),
      auteur: document.getElementById('f-auteur').value.trim(),
      categorie: document.getElementById('f-categorie').value.trim(),
      contenu: document.getElementById('f-contenu').value.trim(),
    };

    if (!body.titre || !body.auteur) {
      toast('Titre et auteur sont obligatoires', 'error');
      return;
    }

    try {
      if (editingId) {
        await api('/' + editingId, { method: 'PUT', body: JSON.stringify(body) });
        toast('Article mis à jour ✓', 'success');
      } else {
        await api('', { method: 'POST', body: JSON.stringify(body) });
        toast('Article publié ✓', 'success');
      }
      closeForm();
      loadArticles();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ─── DELETE ───────────────────────────────────────────────
  async function deleteArticle(id) {
    if (!confirm('Supprimer cet article ?')) return;
    try {
      await api('/' + id, { method: 'DELETE' });
      toast('Article supprimé', 'success');
      loadArticles();
    } catch (e) { toast(e.message, 'error'); }
  }

  // ─── TOAST ────────────────────────────────────────────────
  function toast(msg, type = 'info') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toasts').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }

  // ─── CLOSE ON OVERLAY CLICK ───────────────────────────────
  document.getElementById('form-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeForm();
  });
  document.getElementById('view-overlay').addEventListener('click', function(e) {
    if (e.target === this) closeView();
  });

  // ─── INIT ─────────────────────────────────────────────────
  loadArticles();
</script>
</body>
</html>
